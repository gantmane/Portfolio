# Velero Helm values — chart: vmware-tanzu/velero
# https://github.com/vmware-tanzu/helm-charts

image:
  repository: velero/velero
  tag: v1.13.2
  pullPolicy: IfNotPresent

# AWS plugin for S3-compatible storage
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.9.2
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins
  - name: velero-plugin-for-csi
    image: velero/velero-plugin-for-csi:v0.7.1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

# CSI snapshot support
features: EnableCSI

configuration:
  # Default backup storage location (defined in backup-locations/)
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      prefix: cluster
      credential:
        name: velero-credentials
        key: cloud
      config:
        region: us-east-1

  # Default volume snapshot location
  volumeSnapshotLocation:
    - name: default
      provider: aws
      credential:
        name: velero-credentials
        key: cloud
      config:
        region: us-east-1

  # Upload progress tracking
  uploaderType: kopia

  # Default backup TTL
  defaultBackupTTL: 720h  # 30 days

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Prometheus metrics
metrics:
  enabled: true
  scrapeInterval: 30s
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# Node agent (for file-system backups of PVCs)
nodeAgent:
  enabled: true
  podVolumePath: /var/lib/kubelet/pods
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# RBAC — default ClusterRole is sufficient
rbac:
  create: true
  clusterAdministrator: true

# Store credentials in a pre-created secret
credentials:
  useSecret: true
  existingSecret: velero-credentials

serviceAccount:
  server:
    create: true
    name: velero
    annotations:
      # For IRSA (IAM Roles for Service Accounts on EKS)
      # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/velero-role
