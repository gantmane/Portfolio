# Suricata threshold.conf — Rule Suppression and Rate-Limit Tuning
# Applied via: suricata -c /etc/suricata/suricata.yaml --threshold-file threshold.conf
# Format: Suricata 7.x threshold syntax

# ---------------------------------------------------------------------------
# Suppression: Known benign internal scanners and monitoring
# ---------------------------------------------------------------------------

# Suppress Nmap scan alert for the authorized vulnerability scanner
suppress gen_id 1, sig_id 9004001, track by_src, ip 10.10.1.50

# Suppress CDE scan alert for the PCI-authorized scanner (Tenable)
suppress gen_id 1, sig_id 9004002, track by_src, ip 10.10.1.51

# Suppress SMB admin share alert for domain controllers (legitimate SYSVOL/NETLOGON)
suppress gen_id 1, sig_id 9003002, track by_src, ip 192.168.1.10
suppress gen_id 1, sig_id 9003002, track by_src, ip 192.168.1.11

# ---------------------------------------------------------------------------
# Threshold: Reduce noise on medium-severity rules
# ---------------------------------------------------------------------------

# DNS beaconing — only alert every 5 minutes per source to avoid alert flood
threshold gen_id 1, sig_id 9002003, type limit, track by_src, count 1, seconds 300

# Internal-to-CDE port scan — threshold at 5 unique dests before alerting
threshold gen_id 1, sig_id 9004002, type threshold, track by_src, count 5, seconds 10

# ---------------------------------------------------------------------------
# Rate suppression: High-volume rules that generate excessive alerts
# ---------------------------------------------------------------------------

# Limit Cobalt Strike URI alerts to once per source per minute
threshold gen_id 1, sig_id 9002001, type limit, track by_src, count 1, seconds 60

# Limit DNS exfil alerts per source to 3 per 5 minutes
threshold gen_id 1, sig_id 9002003, type threshold, track by_src, count 3, seconds 300

# ---------------------------------------------------------------------------
# Suppress by destination: Known external threat intel feeds / sinkhole IPs
# (These generate FPs as they are controlled sinkhole addresses)
# ---------------------------------------------------------------------------

# Suppress Sliver C2 rule for known test infrastructure
suppress gen_id 1, sig_id 9002002, track by_dst, ip 198.51.100.0/24
