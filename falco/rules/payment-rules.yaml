---
# Falco Rules: Payment System Runtime Detection
# Author: Evgeniy Gantman
# Purpose: Detect threats specific to payment processing and cardholder data environments
#
# Compliance:
#   - PCI DSS 10.7 — Detect and respond to critical security control failures
#   - PCI DSS 10.3 — Protect audit logs from destruction and modifications
#   - PCI DSS 3.4 — Render PAN unreadable anywhere it is stored
#   - PCI DSS 6.4 — Address common coding vulnerabilities
#
# MITRE ATT&CK Coverage:
#   - TA0006 Credential Access — T1552.001 Credentials in Files
#   - TA0009 Collection — T1005 Data from Local System
#   - TA0010 Exfiltration — T1048 Exfiltration Over Alternative Protocol
#   - TA0040 Impact — T1565.001 Stored Data Manipulation
#
# Usage:
#   Place this file in /etc/falco/rules.d/ or reference via falco.yaml:
#   rules_file:
#     - /etc/falco/falco_rules.yaml
#     - /etc/falco/rules.d/payment-rules.yaml

# ============================================================================
# MACROS — Reusable conditions for payment environment
# ============================================================================

# Identifies containers that process cardholder data (CDE scope)
- macro: payment_container
  condition: >
    (container.image.repository contains "payment" or
     container.image.repository contains "card-processor" or
     container.image.repository contains "transaction" or
     k8s.ns.name in (payment, pci-scope))

# Paths where PAN data or card tokens may be stored
- macro: cardholder_data_path
  condition: >
    (fd.name startswith /var/data/cardholder or
     fd.name startswith /tmp/pan or
     fd.name startswith /var/lib/payment or
     fd.name contains "card_numbers" or
     fd.name contains "pan_store")

# Approved payment processing executables
- macro: authorized_payment_process
  condition: >
    (proc.name in (payment-api, card-processor, transaction-service,
                   vault-agent, envoy))

# Known-good external payment endpoints (HSM, acquiring bank)
- macro: approved_payment_endpoints
  condition: >
    (fd.sip = "10.100.0.50" or   # Internal HSM
     fd.sip = "203.0.113.10")    # Acquiring bank gateway — update per environment

# PCI audit log locations — must not be modified by unauthorized processes
- macro: audit_log_paths
  condition: >
    (fd.name startswith /var/log/payment or
     fd.name startswith /var/log/audit or
     fd.name startswith /var/log/pci)

# ============================================================================
# LISTS — Configurable allowlists
# ============================================================================

# HSM and key management system IPs — only these should receive key material
- list: approved_key_management_ips
  items:
    - "10.100.0.50"   # Vault cluster VIP
    - "10.100.0.51"   # Vault standby

# Processes authorized to read encryption keys
- list: key_access_authorized_procs
  items:
    - vault-agent
    - payment-api

# ============================================================================
# RULES — Payment-Specific Threat Detection
# ============================================================================

# ----------------------------------------------------------------------------
# CRITICAL: Unauthorized Access to Cardholder Data
# PCI DSS 3.4 — PAN must be unreadable; unauthorized reads indicate data theft
# MITRE: TA0009 Collection / T1005 Data from Local System
# ----------------------------------------------------------------------------
- rule: Unauthorized Cardholder Data Access
  desc: >
    A process not in the approved list has accessed a path containing
    cardholder data. Could indicate insider threat or compromised service.
  condition: >
    evt.type = open and
    evt.is_open_read = true and
    cardholder_data_path and
    not authorized_payment_process
  output: >
    CRITICAL: Unauthorized access to cardholder data
    (user=%user.name user_uid=%user.uid
     process=%proc.name proc_exepath=%proc.exepath
     parent=%proc.pname command=%proc.cmdline
     file=%fd.name
     container=%container.name image=%container.image.repository
     namespace=%k8s.ns.name pod=%k8s.pod.name)
  priority: CRITICAL
  tags:
    - pci_dss_3_4
    - data_access
    - credential_access
    - mitre_collection
    - T1005

# ----------------------------------------------------------------------------
# CRITICAL: Cardholder Data Written to Unauthorized Location
# Detects PAN data being written outside approved encrypted storage
# MITRE: TA0009 Collection / T1560 Archive Collected Data
# ----------------------------------------------------------------------------
- rule: Cardholder Data Written to Temp Location
  desc: >
    A payment container is writing to /tmp or other transient locations.
    PAN data must only be written to encrypted, approved storage paths.
    Writing to /tmp may indicate staging for exfiltration.
  condition: >
    evt.type = open and
    evt.is_open_write = true and
    payment_container and
    (fd.name startswith /tmp or
     fd.name startswith /dev/shm or
     fd.name startswith /run) and
    proc.name != "vault-agent"
  output: >
    CRITICAL: Payment container writing to transient storage
    (user=%user.name process=%proc.name command=%proc.cmdline
     file=%fd.name
     container=%container.name image=%container.image.repository
     pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: CRITICAL
  tags:
    - pci_dss_3_4
    - data_staging
    - mitre_collection
    - T1560

# ----------------------------------------------------------------------------
# CRITICAL: PCI Audit Log Modification
# PCI DSS 10.3.2 — Audit logs must be protected from unauthorized modification
# MITRE: TA0005 Defense Evasion / T1070.002 Clear Linux or Mac System Logs
# ----------------------------------------------------------------------------
- rule: PCI Audit Log Tampered
  desc: >
    Modification of PCI audit logs detected. PCI DSS 10.3.2 requires audit
    logs to be protected from unauthorized modification and deletion.
    Log tampering is a key indicator of incident cover-up.
  condition: >
    (evt.type = open and evt.is_open_write = true and audit_log_paths) and
    not proc.name in (fluentd, fluentbit, filebeat, vector, rsyslog, syslog-ng)
  output: >
    CRITICAL: PCI audit log modified by unauthorized process
    (user=%user.name process=%proc.name parent=%proc.pname
     command=%proc.cmdline file=%fd.name
     container=%container.name namespace=%k8s.ns.name)
  priority: CRITICAL
  tags:
    - pci_dss_10_3
    - log_tampering
    - defense_evasion
    - mitre_t1070

# ----------------------------------------------------------------------------
# HIGH: Unexpected Outbound Connection from Payment Service
# PCI DSS 1.3 — Restrict outbound traffic from CDE to approved destinations
# MITRE: TA0010 Exfiltration / T1048 Exfiltration Over Alternative Protocol
# ----------------------------------------------------------------------------
- rule: Payment Service Unexpected Outbound Connection
  desc: >
    A payment processing container established an outbound connection to an
    IP not in the approved allowlist. Could indicate data exfiltration,
    C2 callback, or compromised dependency.
  condition: >
    syscall.type = connect and
    evt.dir = < and
    fd.typechar = 4 and
    payment_container and
    not approved_payment_endpoints and
    not fd.sip in (approved_key_management_ips) and
    not fd.sport in (53) and           # DNS is handled separately
    not fd.sip startswith "127." and   # Loopback
    not fd.sip startswith "169.254."   # Link-local (AWS metadata is blocked by egress policy)
  output: >
    HIGH: Payment service unexpected outbound connection
    (user=%user.name process=%proc.name command=%proc.cmdline
     destination=%fd.sip:%fd.sport proto=%fd.l4proto
     container=%container.name image=%container.image.repository
     pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: ERROR
  tags:
    - pci_dss_1_3
    - network
    - exfiltration
    - mitre_t1048

# ----------------------------------------------------------------------------
# HIGH: Encryption Key Access by Unauthorized Process
# PCI DSS 3.7.1 — Protect encryption keys from unauthorized access
# MITRE: TA0006 Credential Access / T1552.001 Credentials in Files
# ----------------------------------------------------------------------------
- rule: Encryption Key Unauthorized Access
  desc: >
    A process not authorized for key management has accessed encryption key
    material. Keys may be stored as Kubernetes secrets, Vault leases, or
    in key files. Unauthorized access may indicate key theft.
  condition: >
    evt.type = open and evt.is_open_read = true and
    (fd.name contains ".key" or
     fd.name contains "private_key" or
     fd.name contains "encryption_key" or
     fd.name startswith /var/run/secrets/vault or
     fd.name contains "keystore") and
    payment_container and
    not proc.name in (key_access_authorized_procs)
  output: >
    HIGH: Unauthorized access to encryption key material
    (user=%user.name process=%proc.name parent=%proc.pname
     command=%proc.cmdline file=%fd.name
     container=%container.name image=%container.image.repository
     namespace=%k8s.ns.name)
  priority: ERROR
  tags:
    - pci_dss_3_7
    - credential_access
    - key_theft
    - mitre_t1552

# ----------------------------------------------------------------------------
# HIGH: Payment Service Shell Spawned
# Runtime shells in payment containers indicate active exploitation
# MITRE: TA0002 Execution / T1059.004 Unix Shell
# ----------------------------------------------------------------------------
- rule: Shell Spawned in Payment Container
  desc: >
    An interactive shell was spawned inside a payment processing container.
    Payment services should never require shell access at runtime.
    This is a strong indicator of active exploitation or insider threat.
  condition: >
    evt.type = execve and evt.dir = < and
    payment_container and
    proc.name in (bash, sh, zsh, ksh, csh, dash, fish) and
    proc.tty != 0
  output: >
    CRITICAL: Interactive shell spawned in payment container
    (user=%user.name user_uid=%user.uid shell=%proc.name
     parent=%proc.pname command=%proc.cmdline
     container=%container.name image=%container.image.repository
     pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: CRITICAL
  tags:
    - pci_dss_6_4
    - execution
    - shell
    - mitre_t1059

# ----------------------------------------------------------------------------
# MEDIUM: Unusual Database Query Volume (High-Value Data Enumeration)
# PCI DSS 10.2.1 — Monitor all individual user access to cardholder data
# MITRE: TA0009 Collection / T1119 Automated Collection
# ----------------------------------------------------------------------------
- rule: Payment DB Mass Data Access
  desc: >
    A payment service process is performing unusually high-volume database
    read operations. May indicate automated PAN enumeration or data scraping.
    Threshold: >1000 sequential reads within observation window.
  condition: >
    evt.type = read and
    payment_container and
    (fd.name contains "postgres" or
     fd.name contains "mysql" or
     fd.name contains ".db") and
    proc.name not in (authorized_payment_process)
  output: >
    MEDIUM: Payment container high-volume database read operation
    (user=%user.name process=%proc.name command=%proc.cmdline
     file=%fd.name
     container=%container.name namespace=%k8s.ns.name)
  priority: WARNING
  tags:
    - pci_dss_10_2
    - data_access
    - enumeration
    - mitre_t1119

# ----------------------------------------------------------------------------
# MEDIUM: AWS/Cloud Metadata Access from Payment Container
# MITRE: TA0006 Credential Access / T1552.005 Cloud Instance Metadata API
# ----------------------------------------------------------------------------
- rule: Payment Container Cloud Metadata Access
  desc: >
    A payment container is accessing the cloud instance metadata endpoint
    (169.254.169.254). This endpoint provides IAM credentials which could
    be used to access S3 buckets, RDS, or other AWS services outside policy.
  condition: >
    syscall.type = connect and
    evt.dir = < and
    payment_container and
    fd.sip = "169.254.169.254"
  output: >
    HIGH: Payment container accessed cloud instance metadata API
    (user=%user.name process=%proc.name command=%proc.cmdline
     destination=%fd.sip:%fd.sport
     container=%container.name image=%container.image.repository
     pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: ERROR
  tags:
    - credential_access
    - cloud_metadata
    - mitre_t1552_005
