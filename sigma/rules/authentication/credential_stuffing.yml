title: Credential Stuffing Attack — Distributed Low-Rate Auth Failures
id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
status: production
description: |
    Detects credential stuffing attacks characterized by a distributed pattern
    of authentication failures across many source IPs targeting the same
    application or service. Unlike brute force (one IP, many passwords),
    credential stuffing uses one username:password pair per request from
    rotating IPs — often sourced from residential proxies or botnets.
    Detection logic combines failure rate, user enumeration patterns,
    and velocity checks. High relevance to PCI DSS Req 6.4 (protect against
    known vulnerabilities) and Req 8.3 (authentication security).
author: Evgeny Gantman
date: 2025-02-25
modified: 2025-11-20
references:
    - https://attack.mitre.org/techniques/T1110/004/
    - https://owasp.org/www-community/attacks/Credential_stuffing
    - https://www.cloudflare.com/learning/bots/what-is-credential-stuffing/
logsource:
    category: webserver
    product: nginx
    definition: Combined log format with upstream response code tracking
detection:
    selection_auth_endpoint:
        request|contains:
            - '/api/v1/login'
            - '/api/v1/auth'
            - '/api/auth/token'
            - '/login'
            - '/signin'
            - '/api/session'
        request_method: POST
    filter_failure_codes:
        status:
            - '401'
            - '403'
            - '429'
    aggregate_distributed:
        count(status): '>50'
        groupby:
            - request
        timeframe: 5m
    aggregate_high_unique_ips:
        distinct_count(remote_addr): '>20'
        groupby:
            - request
        timeframe: 5m
    filter_bot_indicators:
        http_user_agent|contains:
            - 'python-requests'
            - 'curl/'
            - 'Go-http-client'
            - 'okhttp'
            - 'axios'
        http_user_agent|not|contains:
            - 'Mozilla'
            - 'Chrome'
            - 'Safari'
    condition: (selection_auth_endpoint and filter_failure_codes and aggregate_distributed) or (selection_auth_endpoint and filter_failure_codes and aggregate_high_unique_ips) or (selection_auth_endpoint and filter_failure_codes and filter_bot_indicators)
falsepositives:
    - Mobile app releases causing sudden legitimate traffic spikes
    - Load testing with non-browser user agents
    - API integrations from partner systems using non-browser clients
level: high
tags:
    - attack.credential_access
    - attack.t1110.004
    - attack.t1078
    - attack.initial_access
    - pci.req6.4
    - pci.req8.3
fields:
    - remote_addr
    - request
    - status
    - http_user_agent
    - http_referer
    - body_bytes_sent
    - upstream_response_time
