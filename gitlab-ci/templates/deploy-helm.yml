# Helm Deployment Template
# Atomic upgrade with automatic rollback on failure
# Verifies cosign image signature before deploy
# Runs post-deploy smoke tests against live endpoints
# Requires: KUBECONFIG or K8S_* variables, HELM_RELEASE, HELM_CHART, HELM_NAMESPACE

.deploy-helm:
  stage: deploy
  image: alpine/helm:3.14.4
  variables:
    HELM_RELEASE: "$CI_PROJECT_NAME"
    HELM_CHART: "./charts/$CI_PROJECT_NAME"
    HELM_NAMESPACE: "default"
    HELM_VALUES_FILE: "charts/values.yaml"
    # Environment-specific values overlay
    HELM_ENV_VALUES_FILE: "charts/values.$CI_ENVIRONMENT_NAME.yaml"
    IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    # Timeout for helm upgrade --atomic
    HELM_TIMEOUT: "10m"
    # Wait for rollout after upgrade
    HELM_WAIT: "true"
    # Smoke test endpoint (relative to ingress host)
    SMOKE_TEST_PATH: "/healthz"
    SMOKE_TEST_TIMEOUT: "30"
    # Cosign verification (set to "false" to skip — not recommended)
    VERIFY_SIGNATURE: "true"
    REKOR_URL: "https://rekor.sigstore.dev"
    COSIGN_CERTIFICATE_OIDC_ISSUER: "https://gitlab.com"
    COSIGN_CERTIFICATE_IDENTITY_REGEXP: "https://gitlab.com/$CI_PROJECT_PATH//.+"
  before_script:
    - |
      echo "=== Helm Deploy ==="
      helm version
      kubectl version --client 2>/dev/null || true

      # Validate required variables
      for VAR in HELM_RELEASE HELM_CHART HELM_NAMESPACE IMAGE_TAG; do
        eval VAL="\$$VAR"
        if [ -z "$VAL" ]; then
          echo "ERROR: $VAR is not set."
          exit 1
        fi
      done

      # Configure kubectl (support kubeconfig secret or in-cluster)
      if [ -n "$KUBECONFIG_B64" ]; then
        mkdir -p ~/.kube
        echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config
        echo "Kubeconfig loaded from KUBECONFIG_B64."
      elif [ -f "$KUBECONFIG" ]; then
        echo "Using KUBECONFIG: $KUBECONFIG"
      else
        echo "WARNING: No kubeconfig found — assuming in-cluster context."
      fi

      kubectl cluster-info 2>&1 | head -3 || echo "kubectl not available — Helm only mode."

      # Ensure namespace exists
      kubectl get namespace "$HELM_NAMESPACE" >/dev/null 2>&1 \
        || kubectl create namespace "$HELM_NAMESPACE"
  script:
    - |
      # Step 1: Verify image signature (keyless cosign)
      if [ "$VERIFY_SIGNATURE" = "true" ]; then
        echo "--- Verifying image signature ---"
        if ! command -v cosign >/dev/null 2>&1; then
          # Install cosign in alpine
          apk add --no-cache curl >/dev/null
          curl -sSL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 \
            -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
        fi

        cosign verify \
          --rekor-url "$REKOR_URL" \
          --certificate-oidc-issuer "$COSIGN_CERTIFICATE_OIDC_ISSUER" \
          --certificate-identity-regexp "$COSIGN_CERTIFICATE_IDENTITY_REGEXP" \
          "$IMAGE_TAG" >/dev/null

        if [ $? -ne 0 ]; then
          echo "BLOCKED: Image signature verification failed. Aborting deploy."
          exit 1
        fi
        echo "Signature verified — proceeding."
      else
        echo "WARNING: Signature verification disabled (VERIFY_SIGNATURE=false)."
      fi

      # Step 2: Helm dry-run (always run before actual upgrade)
      echo "--- Helm dry-run ---"
      helm upgrade --install "$HELM_RELEASE" "$HELM_CHART" \
        --namespace "$HELM_NAMESPACE" \
        --values "$HELM_VALUES_FILE" \
        $([ -f "$HELM_ENV_VALUES_FILE" ] && echo "--values $HELM_ENV_VALUES_FILE" || true) \
        --set "image.tag=$CI_COMMIT_SHORT_SHA" \
        --set "image.repository=$CI_REGISTRY_IMAGE" \
        --dry-run --debug \
        2>&1 | grep -v "^#" | tail -50

      echo "Dry-run passed — applying."

      # Step 3: Record current revision before upgrade (for rollback)
      PREV_REVISION=$(helm history "$HELM_RELEASE" \
        --namespace "$HELM_NAMESPACE" \
        --max 1 \
        --output json 2>/dev/null \
        | python3 -c "import json,sys; h=json.load(sys.stdin); print(h[0]['revision'] if h else 0)" \
        2>/dev/null || echo "0")
      echo "Previous revision: $PREV_REVISION"

      # Step 4: Atomic upgrade (rolls back automatically on failure)
      helm upgrade --install "$HELM_RELEASE" "$HELM_CHART" \
        --namespace "$HELM_NAMESPACE" \
        --values "$HELM_VALUES_FILE" \
        $([ -f "$HELM_ENV_VALUES_FILE" ] && echo "--values $HELM_ENV_VALUES_FILE" || true) \
        --set "image.tag=$CI_COMMIT_SHORT_SHA" \
        --set "image.repository=$CI_REGISTRY_IMAGE" \
        --set "deployment.annotations.gitlab/pipeline=$CI_PIPELINE_ID" \
        --set "deployment.annotations.gitlab/commit=$CI_COMMIT_SHORT_SHA" \
        --atomic \
        --timeout "$HELM_TIMEOUT" \
        --wait="$HELM_WAIT" \
        --history-max 10

      HELM_EXIT=$?

      if [ $HELM_EXIT -ne 0 ]; then
        echo "FAILED: Helm upgrade failed. --atomic has triggered automatic rollback."
        echo "Previous revision $PREV_REVISION has been restored."
        # Print Helm status for diagnosis
        helm status "$HELM_RELEASE" --namespace "$HELM_NAMESPACE" 2>/dev/null || true
        helm history "$HELM_RELEASE" --namespace "$HELM_NAMESPACE" --max 5 2>/dev/null || true
        exit 1
      fi

      echo "=== Upgrade successful ==="
      helm status "$HELM_RELEASE" --namespace "$HELM_NAMESPACE"

      # Step 5: Post-deploy smoke test
      echo "--- Post-deploy smoke test ---"
      # Resolve service endpoint from Helm release
      INGRESS_HOST=$(helm get values "$HELM_RELEASE" \
        --namespace "$HELM_NAMESPACE" \
        --output json 2>/dev/null \
        | python3 -c "import json,sys; v=json.load(sys.stdin); print(v.get('ingress',{}).get('host',''))" \
        2>/dev/null || echo "")

      if [ -n "$INGRESS_HOST" ]; then
        SMOKE_URL="https://$INGRESS_HOST$SMOKE_TEST_PATH"
      elif [ -n "$APP_URL" ]; then
        SMOKE_URL="$APP_URL$SMOKE_TEST_PATH"
      else
        echo "WARNING: Could not determine smoke test URL — skipping."
        SMOKE_URL=""
      fi

      if [ -n "$SMOKE_URL" ]; then
        echo "Smoke testing: $SMOKE_URL"
        apk add --no-cache curl >/dev/null 2>&1 || true

        RETRY=0
        MAX_RETRIES=5
        until curl -sf --max-time 10 "$SMOKE_URL" -o /dev/null; do
          RETRY=$((RETRY+1))
          if [ $RETRY -ge $MAX_RETRIES ]; then
            echo "FAILED: Smoke test failed after $MAX_RETRIES attempts — $SMOKE_URL"
            echo "Initiating manual rollback..."
            helm rollback "$HELM_RELEASE" "$PREV_REVISION" \
              --namespace "$HELM_NAMESPACE" \
              --wait --timeout 5m || true
            exit 1
          fi
          echo "Attempt $RETRY/$MAX_RETRIES — waiting 10s..."
          sleep 10
        done
        echo "PASS: Smoke test passed — $SMOKE_URL"
      fi

      echo "=== Deploy complete: $HELM_RELEASE @ $CI_COMMIT_SHORT_SHA ==="
  after_script:
    - |
      # Always print final release status
      helm status "$HELM_RELEASE" \
        --namespace "$HELM_NAMESPACE" 2>/dev/null || true
  environment:
    name: $CI_ENVIRONMENT_NAME
    url: $APP_URL
    on_stop: .deploy-helm-stop
  artifacts:
    name: "helm-deploy-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 7 days
    paths:
      - /tmp/helm-*.txt
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        CI_ENVIRONMENT_NAME: staging
    - if: $CI_COMMIT_TAG
      variables:
        CI_ENVIRONMENT_NAME: production
  allow_failure: false


# Teardown job for review environments
.deploy-helm-stop:
  stage: deploy
  image: alpine/helm:3.14.4
  variables:
    GIT_STRATEGY: none
  when: manual
  environment:
    name: $CI_ENVIRONMENT_NAME
    action: stop
  script:
    - |
      helm uninstall "$HELM_RELEASE" \
        --namespace "$HELM_NAMESPACE" \
        --wait \
        --timeout 5m \
        2>&1 || echo "Release not found — nothing to uninstall."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
