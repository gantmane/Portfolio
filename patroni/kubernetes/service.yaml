---
# Headless service for StatefulSet DNS — internal pod-to-pod discovery
apiVersion: v1
kind: Service
metadata:
  name: patroni-headless
  namespace: postgres
  labels:
    app: patroni
    component: postgresql
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: patroni
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
    - name: patroni-api
      port: 8008
      targetPort: 8008

---
# Primary (read-write) endpoint — routes only to the current primary
apiVersion: v1
kind: Service
metadata:
  name: patroni-primary
  namespace: postgres
  labels:
    app: patroni
    component: postgresql
    role: primary
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: ClusterIP
  selector:
    app: patroni
    role: primary
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP

---
# Replica (read-only) endpoint — routes to standby replicas
apiVersion: v1
kind: Service
metadata:
  name: patroni-replica
  namespace: postgres
  labels:
    app: patroni
    component: postgresql
    role: replica
spec:
  type: ClusterIP
  selector:
    app: patroni
    role: replica
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP

---
# Patroni REST API service — for patronictl and health checks
apiVersion: v1
kind: Service
metadata:
  name: patroni-api
  namespace: postgres
  labels:
    app: patroni
    component: postgresql
spec:
  type: ClusterIP
  selector:
    app: patroni
  ports:
    - name: patroni-api
      port: 8008
      targetPort: 8008
      protocol: TCP
