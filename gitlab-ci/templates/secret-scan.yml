# Gitleaks Secret Scanning Template
# Scans full git history on default branch; diff-only on MRs
# Fails on ANY secret finding - zero tolerance
# GL converter: gitlab-ci/templates/gitleaks_to_gl.py (included in repo)

.secret-scan:
  stage: test
  image: zricethezav/gitleaks:v8.18.2
  variables:
    GITLEAKS_REPORT: "gitleaks-report.json"
    GITLEAKS_SARIF: "gitleaks.sarif"
    GITLAB_REPORT: "gl-secret-detection-report.json"
    GITLEAKS_SOURCE: "."
    GITLEAKS_CONFIG: ".gitleaks.toml"
    GITLEAKS_REDACT: "true"
    GITLEAKS_LOG_LEVEL: "warn"
    GITLEAKS_CONVERTER: "gitlab-ci/templates/gitleaks_to_gl.py"
  before_script:
    - |
      echo "=== Gitleaks Secret Scanner ==="
      gitleaks version

      if [ -f "$GITLEAKS_CONFIG" ]; then
        export CONFIG_FLAG="--config $GITLEAKS_CONFIG"
        echo "Custom config: $GITLEAKS_CONFIG"
      else
        export CONFIG_FLAG=""
      fi

      if [ "$GITLEAKS_REDACT" = "true" ]; then
        export REDACT_FLAG="--redact"
      else
        export REDACT_FLAG=""
      fi
  script:
    - |
      # MR: scan only changed commits; default branch: full history
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ] && [ -n "$CI_MERGE_REQUEST_DIFF_BASE_SHA" ]; then
        echo "--- MR scan: $CI_MERGE_REQUEST_DIFF_BASE_SHA..HEAD ---"
        export LOG_OPTS="--log-opts $CI_MERGE_REQUEST_DIFF_BASE_SHA..HEAD"
      else
        echo "--- Full history scan ---"
        export LOG_OPTS=""
      fi

      GITLEAKS_EXIT=0
      gitleaks detect \
        --log-level "$GITLEAKS_LOG_LEVEL" \
        --source "$GITLEAKS_SOURCE" \
        $LOG_OPTS \
        $CONFIG_FLAG \
        $REDACT_FLAG \
        --report-format json \
        --report-path "$GITLEAKS_REPORT" \
        --exit-code 1 \
        || GITLEAKS_EXIT=$?

      # SARIF output for report artifacts (no exit-code enforcement)
      gitleaks detect \
        --log-level "$GITLEAKS_LOG_LEVEL" \
        --source "$GITLEAKS_SOURCE" \
        $LOG_OPTS \
        $CONFIG_FLAG \
        $REDACT_FLAG \
        --report-format sarif \
        --report-path "$GITLEAKS_SARIF" \
        --exit-code 0 2>/dev/null || true

      # Convert to GitLab secret detection format
      if [ -f "$GITLEAKS_CONVERTER" ]; then
        python3 "$GITLEAKS_CONVERTER"
      else
        echo "WARNING: $GITLEAKS_CONVERTER not found - GL report skipped."
      fi

      echo "=== Secret Scan Result ==="
      if [ "$GITLEAKS_EXIT" -ne 0 ]; then
        echo "BLOCKED: Secrets detected. Review $GITLEAKS_REPORT."
        exit 1
      else
        echo "PASS: No secrets found."
      fi
  artifacts:
    name: "gitleaks-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 30 days
    paths:
      - "$GITLEAKS_REPORT"
      - "$GITLEAKS_SARIF"
      - "$GITLAB_REPORT"
    reports:
      secret_detection: "$GITLAB_REPORT"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  allow_failure: false


# Pre-commit hook generator (manual trigger, run once per repo setup)
.setup-gitleaks-precommit:
  stage: .pre
  image: alpine:3.19
  when: manual
  script:
    - |
      printf '%s\n' \
        '#!/bin/sh' \
        '# Gitleaks pre-commit hook' \
        '# Install: cp pre-commit-gitleaks.sh .git/hooks/pre-commit && chmod +x .git/hooks/pre-commit' \
        'STAGED=$(git diff --cached --name-only)' \
        'if [ -z "$STAGED" ]; then exit 0; fi' \
        'if command -v gitleaks >/dev/null 2>&1; then' \
        '  gitleaks protect --staged --redact --exit-code 1' \
        '  if [ $? -ne 0 ]; then' \
        '    echo "ERROR: Gitleaks detected secrets. Commit blocked."' \
        '    exit 1' \
        '  fi' \
        'else' \
        '  echo "WARNING: gitleaks not installed. Install: brew install gitleaks"' \
        'fi' \
        > /tmp/pre-commit-gitleaks.sh
      chmod +x /tmp/pre-commit-gitleaks.sh
      echo "--- Hook contents ---"
      cat /tmp/pre-commit-gitleaks.sh
      echo "Install: cp /tmp/pre-commit-gitleaks.sh .git/hooks/pre-commit"
  artifacts:
    paths:
      - /tmp/pre-commit-gitleaks.sh
    expire_in: 1 day
  rules:
    - when: manual
