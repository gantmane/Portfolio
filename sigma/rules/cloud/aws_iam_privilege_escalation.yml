title: AWS IAM Privilege Escalation via Policy Attachment
id: a3f2d1b4-7c8e-4f5a-9d2b-1e6f3a8c5d07
status: production
description: |
    Detects AWS IAM privilege escalation techniques where an attacker attaches
    high-privilege managed policies or creates inline policies granting broad
    permissions. Covers 15+ escalation paths documented in Rhino Security Labs
    research. Relevant to PCI DSS Requirement 7 (restrict access to system
    components) and Requirement 8 (identify users and authenticate access).
author: Evgeny Gantman
date: 2025-01-15
modified: 2025-11-20
references:
    - https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
    - https://attack.mitre.org/techniques/T1098/
    - https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_managed-vs-inline.html
logsource:
    product: aws
    service: cloudtrail
detection:
    selection_policy_attach:
        eventSource: iam.amazonaws.com
        eventName|contains:
            - AttachUserPolicy
            - AttachGroupPolicy
            - AttachRolePolicy
            - PutUserPolicy
            - PutGroupPolicy
            - PutRolePolicy
    filter_admin_policies:
        requestParameters.policyArn|contains:
            - arn:aws:iam::aws:policy/AdministratorAccess
            - arn:aws:iam::aws:policy/IAMFullAccess
            - arn:aws:iam::aws:policy/PowerUserAccess
    selection_create_escalate:
        eventSource: iam.amazonaws.com
        eventName|contains:
            - CreatePolicyVersion
            - SetDefaultPolicyVersion
            - PassRole
    filter_inline_wildcard:
        requestParameters.policyDocument|contains:
            - '"Action":"*"'
            - '"Resource":"*"'
            - '"Effect":"Allow"'
    condition: (selection_policy_attach and filter_admin_policies) or (selection_create_escalate and filter_inline_wildcard)
    timeframe: 30m
falsepositives:
    - Automated provisioning tools (Terraform, CloudFormation) applying managed policies
    - Break-glass emergency access procedures
    - IAM administrators performing legitimate role assignments
level: high
tags:
    - attack.privilege_escalation
    - attack.t1098
    - attack.t1078.004
    - attack.persistence
    - pci.req7
    - pci.req8
    - pci.req10
fields:
    - userIdentity.arn
    - userIdentity.accountId
    - eventName
    - sourceIPAddress
    - requestParameters.policyArn
    - requestParameters.userName
    - requestParameters.roleName
    - responseElements.policyVersion.isDefaultVersion
