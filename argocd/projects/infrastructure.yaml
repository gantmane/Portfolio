## AppProject: infrastructure
## Cluster-wide resources — Vault, cert-manager, ingress, storage, namespaces
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Cluster-wide infrastructure components — networking, storage, certificates, secrets"

  ## Allowed source repositories
  sourceRepos:
    - https://github.com/gantmane/Portfolio.git
    - https://charts.jetstack.io
    - https://helm.releases.hashicorp.com
    - https://kubernetes.github.io/ingress-nginx
    - https://charts.external-secrets.io
    - https://prometheus-community.github.io/helm-charts

  ## Allowed destination clusters and namespaces
  destinations:
    - server: https://kubernetes.default.svc
      namespace: vault
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: kube-system

  ## Cluster-scoped resources this project may manage
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: ""
      kind: PersistentVolume
    - group: storage.k8s.io
      kind: StorageClass
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: cert-manager.io
      kind: ClusterIssuer

  ## Namespace-scoped resources allowed
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  ## Orphaned resource monitoring
  orphanedResources:
    warn: true

  ## Sync windows — maintenance window for infrastructure changes
  syncWindows:
    - kind: allow
      schedule: "0 2 * * 0"    # Sundays 02:00 UTC
      duration: 2h
      applications:
        - "*"
      namespaces:
        - kube-system
    - kind: deny
      schedule: "0 9 * * 1-5"  # Block changes Mon-Fri 09:00-17:00 UTC
      duration: 8h
      applications:
        - "*"

  ## Roles within this project
  roles:
    - name: infra-admin
      description: Full access to infrastructure project
      policies:
        - p, proj:infrastructure:infra-admin, applications, *, infrastructure/*, allow
      groups:
        - argocd-admins
    - name: infra-readonly
      description: Read-only view of infrastructure project
      policies:
        - p, proj:infrastructure:infra-readonly, applications, get, infrastructure/*, allow
      groups:
        - argocd-readonly
