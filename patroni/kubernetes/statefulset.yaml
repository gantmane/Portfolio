---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: patroni
  namespace: postgres
  labels:
    app: patroni
    component: postgresql
spec:
  serviceName: patroni-headless
  replicas: 3
  selector:
    matchLabels:
      app: patroni
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: patroni
        component: postgresql
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: patroni
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999

      initContainers:
        - name: init-chmod-data
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/patroni/pgdata && chown -R 999:999 /data/patroni"]
          volumeMounts:
            - name: pgdata
              mountPath: /data/patroni
          securityContext:
            runAsUser: 0

      containers:
        - name: patroni
          image: ghcr.io/zalando/spilo-15:3.2-p1
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
            - name: patroni-api
              containerPort: 8008
              protocol: TCP

          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PATRONI_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patroni-secrets
                  key: superuser-password
            - name: PATRONI_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patroni-secrets
                  key: replication-password
            - name: PATRONI_REWIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patroni-secrets
                  key: rewind-password
            - name: PATRONI_REST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patroni-secrets
                  key: rest-password
            - name: ETCD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patroni-secrets
                  key: etcd-password
            - name: WALARCHIVE_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: patroni-env
                  key: walarchive-bucket
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: patroni-env
                  key: minio-endpoint
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: patroni-secrets
                  key: s3-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: patroni-secrets
                  key: s3-secret-key

          volumeMounts:
            - name: pgdata
              mountPath: /data/patroni
            - name: patroni-config
              mountPath: /etc/patroni/patroni.yml
              subPath: patroni.yml
            - name: scripts
              mountPath: /scripts
            - name: etcd-certs
              mountPath: /etc/etcd
              readOnly: true
            - name: shm
              mountPath: /dev/shm

          readinessProbe:
            httpGet:
              path: /readiness
              port: 8008
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /liveness
              port: 8008
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5

          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi

        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: patroni-secrets
                  key: exporter-dsn
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

      volumes:
        - name: patroni-config
          configMap:
            name: patroni-config
        - name: scripts
          configMap:
            name: patroni-scripts
            defaultMode: 0755
        - name: etcd-certs
          secret:
            secretName: etcd-client-certs
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi

  volumeClaimTemplates:
    - metadata:
        name: pgdata
        labels:
          app: patroni
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
