---
# Network Policy: Default Deny All Ingress and Egress
# Author: Evgeniy Gantman
# Purpose: Establish zero-trust baseline — block all traffic unless explicitly permitted
#
# Compliance:
#   - PCI DSS 1.2.1 — Restrict inbound and outbound traffic to that necessary
#   - PCI DSS 1.3.1 — Restrict inbound traffic to system components in the CDE
#   - CIS Kubernetes Benchmark 5.3.2 — Ensure NetworkPolicy is enabled
#   - NIST SP 800-204 — Microservices security
#
# Zero Trust Principle:
#   "Never trust, always verify" — deny all by default, permit by explicit need.
#   This policy creates the deny-all baseline. Subsequent policies in this
#   directory add specific allowances. The order is:
#
#   1. default-deny.yaml (this file) — block everything
#   2. allow-api-gateway.yaml — permit specific service-to-service flows
#   3. egress-allowlist.yaml — permit approved external destinations only
#
# Deployment:
#   Apply to every namespace that contains workloads. Namespaces without
#   a NetworkPolicy have no traffic restrictions by default.

# ============================================================================
# Production Namespace — Default Deny All
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: production
  labels:
    app.kubernetes.io/managed-by: gitops
    security.io/policy-type: default-deny
    security.io/compliance: pci-dss
  annotations:
    description: "Zero-trust baseline: deny all ingress and egress traffic"
    security.io/pci-dss: "1.2.1,1.3.1"
    security.io/cis-benchmark: "5.3.2"
spec:
  # Empty podSelector matches ALL pods in the namespace
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # No ingress or egress rules = deny all
  # Explicit allow rules must be defined in separate NetworkPolicy objects

---
# ============================================================================
# Payment Namespace — Default Deny All (PCI CDE)
# Applied to CDE namespace with additional annotation for compliance tracking
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: payment
  labels:
    app.kubernetes.io/managed-by: gitops
    security.io/policy-type: default-deny
    security.io/compliance: pci-dss
    security.io/pci-scope: "true"
  annotations:
    description: "PCI CDE zero-trust baseline: deny all traffic"
    security.io/pci-dss: "1.2.1,1.3.1,1.3.2"
    security.io/cis-benchmark: "5.3.2"
    security.io/data-classification: restricted
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ============================================================================
# Staging Namespace — Default Deny All
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: staging
  labels:
    app.kubernetes.io/managed-by: gitops
    security.io/policy-type: default-deny
  annotations:
    description: "Zero-trust baseline for staging: deny all traffic"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ============================================================================
# Allow DNS Resolution (Egress to kube-dns)
# DNS must be explicitly permitted after default deny.
# Without DNS, pods cannot resolve Service names (cluster DNS).
# Applied cluster-wide to all monitored namespaces.
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: production
  labels:
    app.kubernetes.io/managed-by: gitops
    security.io/policy-type: allow-specific
  annotations:
    description: "Allow DNS egress to kube-dns — required for service discovery"
    security.io/rationale: >
      After default-deny, pods cannot resolve cluster DNS. This policy
      permits UDP/TCP port 53 egress to the kube-dns namespace only.
      Without this, ALL service name lookups fail and the application cannot start.
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # kube-dns CoreDNS pods in kube-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Allow DNS egress for payment namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: payment
  labels:
    app.kubernetes.io/managed-by: gitops
    security.io/policy-type: allow-specific
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ============================================================================
# Allow Prometheus Scraping (Ingress from monitoring namespace)
# Monitoring must be explicitly allowed after default deny.
# Prometheus scrapes /metrics endpoints on all pods for observability.
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: production
  labels:
    app.kubernetes.io/managed-by: gitops
    security.io/policy-type: allow-specific
  annotations:
    description: "Allow Prometheus to scrape metrics from production pods"
spec:
  # Apply to all pods that expose Prometheus metrics
  podSelector:
    matchLabels:
      monitoring.io/scrape: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        # Standard Prometheus metrics port
        - protocol: TCP
          port: 9090
        # Envoy/Istio sidecar metrics
        - protocol: TCP
          port: 15090
